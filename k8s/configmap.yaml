# ── ConfigMap ─────────────────────────────────────────────────────────────────
# Stores non-sensitive configuration for the DevOpsHub application.
# Referenced by the Deployment via envFrom.configMapRef.
apiVersion: v1
kind: ConfigMap
metadata:
  name: devopshub-config
  namespace: devopshub
  labels:
    app.kubernetes.io/name: devopshub
    app.kubernetes.io/component: config
data:
  # Express server port (must match containerPort in deployment.yaml)
  PORT: "3000"
  # Node.js environment — controls error verbosity and stack traces
  NODE_ENV: "production"
  # Application log level
  LOG_LEVEL: "info"
  # Session cookie max-age in milliseconds (1 hour)
  SESSION_MAX_AGE: "3600000"
