# ── Secrets ───────────────────────────────────────────────────────────────────
# Stores sensitive credentials for the DevOpsHub application.
# Values MUST be base64-encoded. Use: echo -n 'your-value' | base64
#
# DO NOT commit real secret values to source control.
# In production, use a secrets manager (AWS Secrets Manager, Vault, Sealed Secrets)
# and inject values via your CI/CD pipeline.
#
# To apply with real values (replace placeholders first):
#   kubectl apply -f k8s/secrets.yaml -n devopshub
#
# To create from environment variables without storing in Git:
#   kubectl create secret generic devopshub-secrets \
#     --from-literal=RAPIDAPI_KEY="$RAPIDAPI_KEY" \
#     --from-literal=OMDB_API_KEY="$OMDB_API_KEY" \
#     --from-literal=SESSION_SECRET="$SESSION_SECRET" \
#     --namespace devopshub
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: devopshub-secrets
  namespace: devopshub
  labels:
    app.kubernetes.io/name: devopshub
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # RapidAPI key for the AI Nutritional Facts API
  # echo -n 'your-rapidapi-key' | base64
  RAPIDAPI_KEY: REPLACE_WITH_BASE64_RAPIDAPI_KEY

  # OMDb API key for movie search and ratings
  # echo -n 'your-omdb-key' | base64
  OMDB_API_KEY: REPLACE_WITH_BASE64_OMDB_KEY

  # Express session secret — use a long random string in production
  # echo -n 'your-session-secret-min-32-chars' | base64
  SESSION_SECRET: REPLACE_WITH_BASE64_SESSION_SECRET
